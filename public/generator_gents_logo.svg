<svg width="800" height="400" viewBox="0 0 800 400" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Generator Gents Logo</title>
  <desc>GG monogram logo for Generator Gents, gold on black</desc>
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5D67A"/>
      <stop offset="30%" stop-color="#D4A017"/>
      <stop offset="60%" stop-color="#C8870A"/>
      <stop offset="80%" stop-color="#E8C050"/>
      <stop offset="100%" stop-color="#A0700A"/>
    </linearGradient>
    <linearGradient id="goldRule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A0700A" stop-opacity="0"/>
      <stop offset="30%" stop-color="#D4A017"/>
      <stop offset="70%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#A0700A" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#0A0A0A"/>
  <text x="400" y="260"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="220"
    font-weight="700"
    text-anchor="middle"
    fill="url(#gold)"
    letter-spacing="-10">GG</text>
  <line x1="110" y1="305" x2="275" y2="305" stroke="url(#goldRule)" stroke-width="1.2"/>
  <polygon points="275,300 282,305 275,310 268,305" fill="#D4A017"/>
  <text x="400" y="320"
    font-family="'Gill Sans', 'Trebuchet MS', Arial, sans-serif"
    font-size="16"
    font-weight="400"
    text-anchor="middle"
    fill="#D4A017"
    letter-spacing="10">GENERATOR GENTS</text>
  <polygon points="525,300 532,305 525,310 518,305" fill="#D4A017"/>
  <line x1="532" y1="305" x2="690" y2="305" stroke="url(#goldRule)" stroke-width="1.2"/>
</svg>
